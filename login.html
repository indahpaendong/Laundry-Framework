<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#FFD966">
    <title>LaundryGo - Admin Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        :root {
            --pastel-yellow-light: #FFF9E6; --pastel-yellow: #FFEEB3;
            --pastel-yellow-medium: #FFE599; --pastel-yellow-dark: #FFD966;
            --text-primary: #5A4A42; --text-secondary: #8B7355;
            --white-soft: #FFFDF9; --shadow-soft: 0 8px 32px rgba(90, 74, 66, 0.08);
            --radius-lg: 24px; --radius-md: 16px; --transition: all 0.3s ease;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, var(--pastel-yellow-light) 0%, var(--pastel-yellow) 50%, var(--pastel-yellow-medium) 100%);
            min-height: 100vh; color: var(--text-primary); position: relative; overflow-x: hidden; line-height: 1.6;
        }
        body::before, body::after {
            content: ''; position: absolute; border-radius: 50%;
            background: radial-gradient(circle, rgba(255, 217, 102, 0.15) 0%, transparent 70%);
            z-index: 0; pointer-events: none;
        }
        body::before { width: 400px; height: 400px; top: -100px; right: -100px; }
        body::after { width: 300px; height: 300px; bottom: -50px; left: -50px; }
        .navbar {
            padding: 1rem 0; position: relative; z-index: 10;
            background: rgba(255, 253, 249, 0.7); backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 233, 153, 0.4);
        }
        .navbar-brand {
            font-weight: 700; font-size: 1.5rem; color: var(--text-primary) !important;
            display: flex; align-items: center; gap: 0.5rem; text-decoration: none;
        }
        .navbar-brand i { font-size: 1.4rem; color: var(--pastel-yellow-dark); }
        .btn-back {
            background: var(--white-soft); color: var(--text-primary);
            border: 2px solid var(--pastel-yellow-dark);
            padding: 0.5rem 1.25rem; border-radius: 50px;
            font-weight: 500; font-size: 0.9rem; transition: var(--transition);
            display: flex; align-items: center; gap: 0.4rem; text-decoration: none;
        }
        .btn-back:hover { background: var(--pastel-yellow-dark); transform: translateY(-2px); }
        .main-content {
            position: relative; z-index: 10; min-height: calc(100vh - 76px);
            display: flex; align-items: center; padding: 2rem 0;
        }
        .login-card {
            background: rgba(255, 253, 249, 0.9); backdrop-filter: blur(20px);
            border-radius: var(--radius-lg); padding: 2.5rem;
            max-width: 440px; width: 100%; margin: 0 auto;
            box-shadow: var(--shadow-soft); border: 1px solid rgba(255, 233, 153, 0.6);
            animation: slideUp 0.6s ease-out;
        }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        .login-header { text-align: center; margin-bottom: 2rem; }
        .login-icon {
            width: 70px; height: 70px;
            background: linear-gradient(135deg, var(--pastel-yellow), var(--pastel-yellow-dark));
            border-radius: 18px; display: flex; align-items: center; justify-content: center;
            margin: 0 auto 1.25rem; box-shadow: 0 8px 24px rgba(255, 217, 102, 0.3);
        }
        .login-icon i { font-size: 1.8rem; color: var(--text-primary); }
        .login-header h1 { font-weight: 700; font-size: 1.6rem; color: var(--text-primary); margin-bottom: 0.4rem; }
        .login-header p { color: var(--text-secondary); font-size: 0.95rem; margin: 0; }
        .form-label { font-weight: 500; font-size: 0.9rem; color: var(--text-primary); margin-bottom: 0.5rem; display: block; }
        .input-group-custom { position: relative; margin-bottom: 1.25rem; }
        .input-group-custom i {
            position: absolute; left: 1rem; top: 50%; transform: translateY(-50%);
            color: var(--text-muted); font-size: 1.1rem;
        }
        .form-control {
            background: var(--white-soft); border: 2px solid var(--pastel-yellow-medium);
            border-radius: var(--radius-md); padding: 0.95rem 1rem 0.95rem 2.75rem;
            font-size: 0.95rem; color: var(--text-primary); transition: var(--transition); width: 100%;
        }
        .form-control:focus {
            background: var(--white-soft); border-color: var(--pastel-yellow-dark);
            box-shadow: 0 0 0 4px rgba(255, 217, 102, 0.15); outline: none;
        }
        .form-options {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 1.5rem; font-size: 0.9rem; flex-wrap: wrap; gap: 0.75rem;
        }
        .form-check { display: flex; align-items: center; gap: 0.5rem; }
        .form-check-input {
            width: 1.1rem; height: 1.1rem; border: 2px solid var(--pastel-yellow-medium);
            border-radius: 6px; cursor: pointer;
        }
        .form-check-input:checked { background: var(--pastel-yellow-dark); border-color: var(--pastel-yellow-dark); }
        .form-check-label { color: var(--text-secondary); cursor: pointer; }
        .forgot-link { color: var(--text-primary); text-decoration: none; font-weight: 500; }
        .forgot-link:hover { color: var(--pastel-yellow-dark); text-decoration: underline; }
        .btn-login {
            background: linear-gradient(135deg, var(--pastel-yellow-dark), var(--pastel-yellow-medium));
            color: var(--text-primary); border: none; border-radius: 50px;
            padding: 1rem; font-weight: 600; font-size: 1rem;
            transition: var(--transition); width: 100%;
            display: flex; align-items: center; justify-content: center; gap: 0.5rem;
            box-shadow: 0 4px 16px rgba(255, 217, 102, 0.25); cursor: pointer;
        }
        .btn-login:hover { transform: translateY(-3px); box-shadow: 0 12px 40px rgba(90, 74, 66, 0.12); }
        .divider {
            display: flex; align-items: center; text-align: center;
            margin: 1.75rem 0; color: var(--text-muted); font-size: 0.85rem;
        }
        .divider::before, .divider::after {
            content: ''; flex: 1; border-bottom: 1px dashed var(--pastel-yellow-medium);
        }
        .divider span { padding: 0 1rem; }
        .social-login { display: flex; gap: 0.75rem; flex-wrap: wrap; }
        .btn-social {
            flex: 1; min-width: calc(50% - 0.75rem);
            background: var(--white-soft); border: 2px solid var(--pastel-yellow-medium);
            border-radius: var(--radius-md); padding: 0.75rem;
            display: flex; align-items: center; justify-content: center; gap: 0.4rem;
            color: var(--text-primary); font-weight: 500; font-size: 0.9rem;
            text-decoration: none; transition: var(--transition);
        }
        .btn-social:hover { border-color: var(--pastel-yellow-dark); background: var(--pastel-yellow); transform: translateY(-2px); }
        .footer {
            text-align: center; padding: 1.5rem; color: var(--text-secondary);
            font-size: 0.85rem; position: relative; z-index: 10;
        }
        .footer a { color: var(--text-primary); text-decoration: none; font-weight: 500; }
        .footer a:hover { text-decoration: underline; }
        @media (max-width: 767px) {
            .login-card { padding: 2rem 1.5rem; margin: 1rem; }
            .form-options { flex-direction: column; align-items: flex-start; }
            .social-login { flex-direction: column; }
            .btn-social { min-width: 100%; }
        }
    </style>
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar">
        <div class="container">
            <a class="navbar-brand" href="index.html">
                <i class="bi bi-basket2-fill"></i><span>LaundryGo</span>
            </a>
            <a href="index.html" class="btn-back"><i class="bi bi-arrow-left"></i><span>Kembali</span></a>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="main-content">
        <div class="container">
            <div class="login-card">
                <div class="login-header">
                    <div class="login-icon"><i class="bi bi-shield-lock"></i></div>
                    <h1>Admin Login</h1>
                    <p>Masuk untuk mengelola sistem LaundryGo</p>
                </div>

                <!-- 🔐 Form Login (HTML5 validation only, redirect ke dashboard) -->
                <form action="admindashboard.html" method="get">
                    <label class="form-label" for="email">Email Admin</label>
                    <div class="input-group-custom">
                        <input type="email" id="email" name="email" class="form-control" 
                               placeholder="admin@laundrygo.com" 
                               required pattern="[a-z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,}$" 
                               autocomplete="email" title="Masukkan email yang valid">
                        <i class="bi bi-envelope"></i>
                    </div>

                    <label class="form-label" for="password">Password</label>
                    <div class="input-group-custom">
                        <input type="password" id="password" name="password" class="form-control" 
                               placeholder="••••••••" 
                               required minlength="6" 
                               autocomplete="current-password" title="Minimal 6 karakter">
                        <i class="bi bi-lock"></i>
                    </div>

                    <div class="form-options">
                        <label class="form-check">
                            <input type="checkbox" class="form-check-input" id="remember" name="remember">
                            <span class="form-check-label">Ingat saya</span>
                        </label>
                        <a href="#" class="forgot-link">Lupa password?</a>
                    </div>

                    <button type="submit" class="btn-login">
                        <i class="bi bi-box-arrow-in-right"></i><span>Masuk Sekarang</span>
                    </button>
                </form>

                <div class="divider"><span>atau masuk dengan</span></div>
                <div class="social-login">
                    <a href="#" class="btn-social"><i class="bi bi-google"></i> Google</a>
                    <a href="#" class="btn-social"><i class="bi bi-microsoft"></i> Microsoft</a>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <p>© 2024 LaundryGo. All rights reserved.<br>
        <a href="#">Butuh bantuan?</a> | <a href="#">Privacy</a></p>
    </footer>
</body>
</html>
