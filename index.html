<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#FFD966">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>LaundryGo - Cek Status</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">

    <style>
        :root {
            --pastel-yellow-light: #FFF9E6;
            --pastel-yellow: #FFEEB3;
            --pastel-yellow-medium: #FFE599;
            --pastel-yellow-dark: #FFD966;
            --text-primary: #5A4A42;
            --text-secondary: #8B7355;
            --white-soft: #FFFDF9;
            --shadow-soft: 0 8px 32px rgba(90, 74, 66, 0.08);
            --shadow-hover: 0 12px 40px rgba(90, 74, 66, 0.12);
            --radius-lg: 24px;
            --radius-md: 16px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            
            /* Spacing variables for consistency */
            --spacing-xs: 0.5rem;
            --spacing-sm: 0.75rem;
            --spacing-md: 1rem;
            --spacing-lg: 1.5rem;
            --spacing-xl: 2rem;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        html {
            scroll-behavior: smooth;
            -webkit-text-size-adjust: 100%;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, var(--pastel-yellow-light) 0%, var(--pastel-yellow) 50%, var(--pastel-yellow-medium) 100%);
            min-height: 100vh;
            color: var(--text-primary);
            position: relative;
            overflow-x: hidden;
            line-height: 1.6;
        }

        /* Decorative background */
        body::before, body::after {
            content: ''; position: absolute; border-radius: 50%;
            background: radial-gradient(circle, rgba(255, 217, 102, 0.15) 0%, transparent 70%);
            z-index: 0; pointer-events: none;
        }
        body::before { width: 400px; height: 400px; top: -100px; right: -100px; }
        body::after { width: 300px; height: 300px; bottom: -50px; left: -50px; }

        /* ========== NAVBAR ========== */
        .navbar {
            padding: var(--spacing-md) 0;
            position: relative;
            z-index: 10;
            background: rgba(255, 253, 249, 0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 233, 153, 0.4);
        }

        .navbar-brand {
            font-weight: 700;
            font-size: 1.5rem;
            color: var(--text-primary) !important;
            display: flex;
            align-items: center;
            gap: var(--spacing-sm);
            text-decoration: none;
        }

        .navbar-brand i {
            font-size: 1.4rem;
            color: var(--pastel-yellow-dark);
        }

        .btn-admin {
            background: var(--white-soft);
            color: var(--text-primary);
            border: 2px solid var(--pastel-yellow-dark);
            padding: 0.5rem 1.25rem;
            border-radius: 50px;
            font-weight: 500;
            font-size: 0.9rem;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 0.4rem;
            text-decoration: none;
            white-space: nowrap;
        }

        .btn-admin:hover, .btn-admin:active {
            background: var(--pastel-yellow-dark);
            color: var(--text-primary);
            transform: translateY(-2px);
            box-shadow: var(--shadow-hover);
        }

        /* ========== MAIN CONTENT ========== */
        .main-content {
            position: relative;
            z-index: 10;
            min-height: calc(100vh - 76px);
            display: flex;
            align-items: center;
            padding: var(--spacing-xl) 0;
        }

        /* ========== TRACKING CARD ========== */
        .tracking-card {
            background: rgba(255, 253, 249, 0.9);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: var(--radius-lg);
            padding: var(--spacing-xl);
            max-width: 480px;
            width: 100%;
            margin: 0 auto;
            box-shadow: var(--shadow-soft);
            border: 1px solid rgba(255, 233, 153, 0.6);
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .tracking-header { margin-bottom: var(--spacing-xl); }

        .tracking-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, var(--pastel-yellow), var(--pastel-yellow-dark));
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto var(--spacing-lg);
            box-shadow: 0 8px 24px rgba(255, 217, 102, 0.3);
        }

        .tracking-icon i {
            font-size: 2rem;
            color: var(--text-primary);
        }

        .tracking-header h1 {
            font-weight: 700;
            font-size: 1.75rem;
            color: var(--text-primary);
            margin-bottom: var(--spacing-xs);
            line-height: 1.3;
        }

        .tracking-header p {
            color: var(--text-secondary);
            font-size: 0.95rem;
            margin: 0;
        }

        /* ========== FORM ========== */
        .form-group { position: relative; margin-bottom: var(--spacing-lg); }

        .form-control {
            background: var(--white-soft);
            border: 2px solid var(--pastel-yellow-medium);
            border-radius: var(--radius-md);
            padding: 1rem 1.25rem;
            font-size: 1rem;
            color: var(--text-primary);
            transition: var(--transition);
            text-align: center;
            font-weight: 500;
            letter-spacing: 2px;
            text-transform: uppercase;
            width: 100%;
        }

        .form-control::placeholder {
            color: var(--text-secondary);
            opacity: 0.7;
            letter-spacing: 1px;
            text-transform: none;
        }

        .form-control:focus {
            background: var(--white-soft);
            border-color: var(--pastel-yellow-dark);
            box-shadow: 0 0 0 4px rgba(255, 217, 102, 0.15);
            outline: none;
            transform: translateY(-1px);
        }

        .btn-track {
            background: linear-gradient(135deg, var(--pastel-yellow-dark), var(--pastel-yellow-medium));
            color: var(--text-primary);
            border: none;
            border-radius: 50px;
            padding: 1rem;
            font-weight: 600;
            font-size: 1rem;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            width: 100%;
            box-shadow: 0 4px 16px rgba(255, 217, 102, 0.25);
            cursor: pointer;
            min-height: 50px;
            touch-action: manipulation;
        }

        .btn-track:hover, .btn-track:active {
            transform: translateY(-3px);
            box-shadow: var(--shadow-hover);
            background: linear-gradient(135deg, var(--pastel-yellow-medium), var(--pastel-yellow-dark));
        }

        .btn-track.loading { pointer-events: none; opacity: 0.8; }
        .btn-track.loading i { animation: spin 1s linear infinite; }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* ========== HELPER TEXT ========== */
        .helper-text {
            text-align: center;
            margin-top: var(--spacing-lg);
            padding-top: var(--spacing-lg);
            border-top: 1px dashed var(--pastel-yellow-medium);
        }

        .helper-text small {
            color: var(--text-secondary);
            font-size: 0.85rem;
            line-height: 1.6;
        }

        .helper-text code {
            background: var(--pastel-yellow);
            color: var(--text-primary);
            padding: 0.2rem 0.5rem;
            border-radius: 6px;
            font-weight: 500;
            font-size: 0.8rem;
            white-space: nowrap;
        }

        /* ========== FOOTER ========== */
        .footer {
            text-align: center;
            padding: var(--spacing-lg);
            color: var(--text-secondary);
            font-size: 0.85rem;
            position: relative;
            z-index: 10;
        }

        .footer a {
            color: var(--text-primary);
            text-decoration: none;
            font-weight: 500;
        }

        .footer a:hover { text-decoration: underline; }

        /* ========== RESPONSIVE BREAKPOINTS ========== */
        
        /* Tablet (768px - 1024px) */
        @media (max-width: 992px) {
            .tracking-card { padding: 2.5rem 2rem; }
            .tracking-header h1 { font-size: 1.6rem; }
        }

        /* Mobile Large (576px - 767px) */
        @media (max-width: 767px) {
            .navbar { padding: 0.75rem 0; }
            .navbar-brand { font-size: 1.3rem; }
            .btn-admin { padding: 0.4rem 1rem; font-size: 0.85rem; }
            
            .main-content { padding: var(--spacing-lg) 0; }
            
            .tracking-card {
                padding: 2rem 1.5rem;
                margin: var(--spacing-md);
                border-radius: 20px;
            }
            
            .tracking-icon {
                width: 70px;
                height: 70px;
                border-radius: 16px;
            }
            
            .tracking-icon i { font-size: 1.75rem; }
            
            .tracking-header h1 { font-size: 1.5rem; }
            .tracking-header p { font-size: 0.9rem; }
            
            .form-control {
                padding: 0.9rem 1rem;
                font-size: 0.95rem;
                letter-spacing: 1.5px;
            }
            
            .btn-track {
                padding: 0.9rem;
                font-size: 0.95rem;
                min-height: 48px;
            }
        }

        /* Mobile Small (375px - 575px) */
        @media (max-width: 575px) {
            .navbar-brand span { display: none; }
            .navbar-brand i { font-size: 1.6rem; }
            
            .btn-admin span { display: none; }
            .btn-admin i { font-size: 1.2rem; }
            
            .tracking-card {
                padding: 1.75rem 1.25rem;
                margin: var(--spacing-sm);
                border-radius: 18px;
            }
            
            .tracking-icon {
                width: 60px;
                height: 60px;
                border-radius: 14px;
                margin-bottom: var(--spacing-md);
            }
            
            .tracking-icon i { font-size: 1.5rem; }
            
            .tracking-header h1 { font-size: 1.3rem; }
            .tracking-header p { font-size: 0.85rem; }
            
            .form-control {
                padding: 0.85rem 0.9rem;
                font-size: 0.9rem;
                letter-spacing: 1px;
            }
            
            .btn-track {
                padding: 0.85rem;
                font-size: 0.9rem;
                min-height: 46px;
            }
            
            .helper-text small { font-size: 0.8rem; }
            
            .footer {
                padding: var(--spacing-md);
                font-size: 0.8rem;
            }
        }

        /* Mobile Extra Small (< 375px) */
        @media (max-width: 374px) {
            .tracking-card { padding: 1.5rem 1rem; }
            .tracking-header h1 { font-size: 1.2rem; }
            .form-control { font-size: 0.85rem; }
            .btn-track { font-size: 0.85rem; }
        }

        /* Landscape Mobile */
        @media (max-height: 500px) and (orientation: landscape) {
            .main-content { align-items: flex-start; padding-top: 2rem; }
            .tracking-card { max-width: 400px; }
        }

        /* Desktop Large (1400px+) */
        @media (min-width: 1400px) {
            .tracking-card { max-width: 520px; }
            .tracking-header h1 { font-size: 2rem; }
            .form-control { font-size: 1.1rem; }
        }

        /* Safe area for notched devices (iPhone X+) */
        @supports (padding: max(0px)) {
            .navbar { padding-left: max(var(--spacing-md), env(safe-area-inset-left)); padding-right: max(var(--spacing-md), env(safe-area-inset-right)); }
            .footer { padding-bottom: max(var(--spacing-lg), env(safe-area-inset-bottom)); }
        }

        /* High contrast mode support */
        @media (prefers-contrast: high) {
            .tracking-card { border: 2px solid var(--text-primary); }
            .form-control { border-width: 3px; }
        }

        /* Reduced motion support */
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>

<body>

    <!-- Navbar -->
    <nav class="navbar">
        <div class="container">
            <a class="navbar-brand" href="index.html">
                <i class="bi bi-basket2-fill"></i>
                <span>LaundryGo</span>
            </a>
            <a href="login.html" class="btn-admin">
                <i class="bi bi-person-lock"></i>
                <span>Admin</span>
            </a>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="main-content">
        <div class="container">
            <div class="tracking-card">
                <!-- Icon Header -->
                <div class="tracking-icon">
                    <i class="bi bi-search-heart"></i>
                </div>
                
                <!-- Header Text -->
                <div class="tracking-header text-center">
                    <h1>Cek Status Laundry</h1>
                    <p>Masukkan kode unik yang diberikan oleh admin</p>
                </div>

                <!-- Form -->
                <form id="trackingForm">
                    <div class="form-group">
                        <input 
                            type="text" 
                            id="kode" 
                            class="form-control" 
                            placeholder="LDY001" 
                            pattern="[A-Za-z0-9]+"
                            maxlength="10"
                            autocomplete="off"
                            required
                            autofocus
                            inputmode="text"
                        >
                    </div>
                    
                    <button type="submit" class="btn-track" id="btnTrack">
                        <i class="bi bi-search"></i>
                        <span>Cek Status Sekarang</span>
                    </button>
                </form>

                <!-- Helper -->
                <div class="helper-text">
                    <small>
                        💡 Tips: Kode biasanya berbentuk <code>LDYxxx</code><br>
                        Cek nota atau WhatsApp dari admin
                    </small>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <p>© 2024 LaundryGo. All rights reserved.<br>
        <a href="help.html">Butuh bantuan?</a></p>
    </footer>

    <script>
        // Form Submission
        document.getElementById("trackingForm").addEventListener("submit", function(e){
            e.preventDefault();
            
            const btn = document.getElementById("btnTrack");
            const kode = document.getElementById("kode").value.trim().toUpperCase();
            const originalContent = btn.innerHTML;
            
            // Loading state
            btn.classList.add("loading");
            btn.innerHTML = '<i class="bi bi-hourglass-split"></i><span>Memproses...</span>';
            
            // Simulate processing & redirect
            setTimeout(() => {
                window.location.href = "hasil-tracking.html?kode=" + encodeURIComponent(kode);
            }, 800);
        });

        // Auto uppercase input
        document.getElementById("kode").addEventListener("input", function(e) {
            this.value = this.value.toUpperCase();
        });

        // Prevent zoom on double tap (mobile)
        document.addEventListener('dblclick', function(event) {
            event.preventDefault();
        }, { passive: false });
    </script>

</body>
</html>
