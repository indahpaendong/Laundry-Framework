<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <!-- supaya tampilan responsive di hp -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- warna tema browser -->
    <meta name="theme-color" content="#FFD966">

    <title>LaundryGo - Admin Login</title>
    
    <!-- Bootstrap CSS (biar gampang styling) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- font poppins biar tampilan lebih modern -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- icon bootstrap -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    
    <style>
        /* variable warna supaya konsisten (jadi ga tulis ulang warna berkali2) */
        :root {
            --pastel-yellow-light: #FFF9E6;
            --pastel-yellow: #FFEEB3;
            --pastel-yellow-medium: #FFE599;
            --pastel-yellow-dark: #FFD966;
            --text-primary: #5A4A42;
            --text-secondary: #8B7355;
            --white-soft: #FFFDF9;
            --shadow-soft: 0 8px 32px rgba(90, 74, 66, 0.08);
            --radius-lg: 24px;
            --radius-md: 16px;
            --transition: all 0.3s ease;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Poppins', sans-serif;
            /* background gradasi biar lebih enak diliat */
            background: linear-gradient(135deg, var(--pastel-yellow-light) 0%, var(--pastel-yellow) 50%, var(--pastel-yellow-medium) 100%);
            min-height: 100vh;
            color: var(--text-primary);
            position: relative;
            overflow-x: hidden;
            line-height: 1.6;
        }

        /* ini hiasan background (biar ga kosong banget) */
        body::before, body::after {
            content: ''; position: absolute; border-radius: 50%;
            background: radial-gradient(circle, rgba(255, 217, 102, 0.15) 0%, transparent 70%);
            z-index: 0; pointer-events: none;
        }

        body::before { width: 400px; height: 400px; top: -100px; right: -100px; }
        body::after { width: 300px; height: 300px; bottom: -50px; left: -50px; }

        /* navbar */
        .navbar {
            padding: 1rem 0;
            position: relative;
            z-index: 10;
            /* efek blur biar keliatan modern dikit */
            background: rgba(255, 253, 249, 0.7);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 233, 153, 0.4);
        }

        .navbar-brand {
            font-weight: 700;
            font-size: 1.5rem;
            color: var(--text-primary) !important;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            text-decoration: none;
        }

        .navbar-brand i { font-size: 1.4rem; color: var(--pastel-yellow-dark); }

        /* tombol kembali */
        .btn-back {
            background: var(--white-soft);
            color: var(--text-primary);
            border: 2px solid var(--pastel-yellow-dark);
            padding: 0.5rem 1.25rem;
            border-radius: 50px;
            font-weight: 500;
            font-size: 0.9rem;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 0.4rem;
            text-decoration: none;
        }

        .btn-back:hover {
            background: var(--pastel-yellow-dark);
            transform: translateY(-2px); /* efek naik dikit pas hover */
        }

        /* main content */
        .main-content {
            position: relative;
            z-index: 10;
            min-height: calc(100vh - 76px);
            display: flex;
            align-items: center;
            padding: 2rem 0;
        }

        /* card login */
        .login-card {
            background: rgba(255, 253, 249, 0.9);
            backdrop-filter: blur(20px);
            border-radius: var(--radius-lg);
            padding: 2.5rem;
            max-width: 440px;
            width: 100%;
            margin: 0 auto;
            box-shadow: var(--shadow-soft);
            border: 1px solid rgba(255, 233, 153, 0.6);
            animation: slideUp 0.6s ease-out; /* animasi muncul */
        }

        /* animasi muncul dari bawah */
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .login-header { text-align: center; margin-bottom: 2rem; }

        /* icon atas */
        .login-icon {
            width: 70px; height: 70px;
            background: linear-gradient(135deg, var(--pastel-yellow), var(--pastel-yellow-dark));
            border-radius: 18px;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 1.25rem;
        }

        .login-icon i { font-size: 1.8rem; color: var(--text-primary); }

        /* input form */
        .input-group-custom { position: relative; margin-bottom: 1.25rem; }

        /* icon di dalam input */
        .input-group-custom i {
            position: absolute; left: 1rem; top: 50%;
            transform: translateY(-50%);
        }

        .form-control {
            border-radius: var(--radius-md);
            padding: 0.95rem 1rem 0.95rem 2.75rem;
        }

        /* tombol login */
        .btn-login {
            background: linear-gradient(135deg, var(--pastel-yellow-dark), var(--pastel-yellow-medium));
            border-radius: 50px;
            padding: 1rem;
            width: 100%;
            cursor: pointer;
        }

        .btn-login:hover {
            transform: translateY(-3px); /* efek hover */
        }
    </style>
</head>

<body>

    <!-- navbar -->
    <nav class="navbar">
        <div class="container">

            <!-- logo + nama web -->
            <!-- ini supaya user tau lagi di halaman apa -->
            <a class="navbar-brand" href="index.html">
                <i class="bi bi-basket2-fill"></i><span>LaundryGo</span>
            </a>

            <!-- tombol kembali ke halaman utama -->
            <!-- biasanya ke halaman tracking customer -->
            <a href="index.html" class="btn-back">
                <i class="bi bi-arrow-left"></i><span>Kembali</span>
            </a>
        </div>
    </nav>

    <!-- main -->
    <main class="main-content">
        <div class="container">
            <div class="login-card">
                
                <!-- header login -->
                <!-- ini cuma tampilan aja biar lebih jelas -->
                <div class="login-header">
                    <div class="login-icon"><i class="bi bi-shield-lock"></i></div>
                    <h1>Admin Login</h1>
                    <p>Masuk untuk mengelola sistem LaundryGo</p>
                </div>

                <!-- form login -->
                <!-- NOTE: ini masih frontend jadi belum ada validasi database -->
                <form action="admindashboard.html" method="get">
                    
                    <!-- input email admin --> <!-- Input Group dengan Icon -->
                    <!-- type email biar ada validasi otomatis -->
                    <label class="form-label" for="email">Email Admin</label>
                    <div class="input-group-custom">
                        <input type="email" id="email" name="email" class="form-control" 
                               placeholder="admin@laundrygo.com" 
                               required 
                               pattern="[a-z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,}$"
                               autocomplete="email">
                        
                        <!-- icon email -->
                        <i class="bi bi-envelope"></i>
                    </div>

                    <!-- input password --> 
                    <!-- minimal 6 karakter biar ga terlalu pendek -->
                    <label class="form-label" for="password">Password</label>
                    <div class="input-group-custom">
                        <input type="password" id="password" name="password" class="form-control" 
                               placeholder="••••••••" 
                               required 
                               minlength="6">
                        
                        <!-- icon password -->
                        <i class="bi bi-lock"></i>
                    </div>

                    <!-- checkbox ingat saya (walaupun belum aktif) --> 
                    <div class="form-options">
                        <label class="form-check">
                            <input type="checkbox" class="form-check-input">
                            <span class="form-check-label">Ingat saya</span>
                        </label>

                        <!-- link lupa password (dummy aja) -->
                        <a href="#" class="forgot-link">Lupa password?</a>
                    </div>

                    <!-- tombol login -->
                    <!-- setelah klik akan pindah ke dashboard admin -->
                    <button type="submit" class="btn-login">
                        <i class="bi bi-box-arrow-in-right"></i><span>Masuk Sekarang</span>
                    </button>

                    <!-- catatan buat jelasin ke dosen -->
                    <!-- ini penting biar keliatan kamu ngerti -->
                    <!--
                    form ini masih frontend jadi belum connect ke database,
                    jadi belum ada validasi akun bener atau tidak.
                    nanti kalau backend ditambah baru dihubungkan ke database
                    -->
                </form>

            </div>
        </div>
    </main>

</body>
</html>
