<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <!-- viewport: biar responsive di mobile, scale pas -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- theme-color: warna status bar di HP -->
    <meta name="theme-color" content="#FFD966">
    <title>LaundryGo - Cek Status</title>

    <!-- Bootstrap CSS: framework layout & komponen siap pakai -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts: font Poppins biar typography modern -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap Icons: icon-icon siap pakai (bi bi-*) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">

    <style>
        /* ====== VARIABEL WARNA (biar gampang ganti tema) ====== */
        :root {
            /* Palette kuning pastel khas LaundryGo */
            --pastel-yellow-light: #FFF9E6;
            --pastel-yellow: #FFEEB3;
            --pastel-yellow-medium: #FFE599;
            --pastel-yellow-dark: #FFD966;
            
            /* Warna teks: primary untuk judul, secondary untuk deskripsi */
            --text-primary: #5A4A42;
            --text-secondary: #8B7355;
            
            /* Background putih soft, gak terlalu silau */
            --white-soft: #FFFDF9;
            
            /* Shadow halus buat efek kedalaman */
            --shadow-soft: 0 8px 32px rgba(90, 74, 66, 0.08);
            --shadow-hover: 0 12px 40px rgba(90, 74, 66, 0.12);
            
            /* Radius border & animasi */
            --radius-lg: 24px;
            --radius-md: 16px;
            --transition: all 0.3s ease;
        }

        /* Reset default browser */
        * { margin: 0; padding: 0; box-sizing: border-box; }

        /* Style dasar body dengan gradient background */
        body {
            font-family: 'Poppins', sans-serif;
            /* Gradient kuning pastel */
            background: linear-gradient(135deg, var(--pastel-yellow-light) 0%, var(--pastel-yellow) 50%, var(--pastel-yellow-medium) 100%);
            min-height: 100vh;
            color: var(--text-primary);
            position: relative;
            overflow-x: hidden;  /* Mencegah scroll horizontal */
            line-height: 1.6;
        }

        /* ====== DEKORASI BACKGROUND ====== */
        /* Circle blur di pojok untuk efek visual aesthetic */
        body::before, body::after {
            content: ''; position: absolute; border-radius: 50%;
            background: radial-gradient(circle, rgba(255, 217, 102, 0.15) 0%, transparent 70%);
            z-index: 0; pointer-events: none;  /* Agar klik tembus ke elemen bawah */
        }
        body::before { width: 400px; height: 400px; top: -100px; right: -100px; }
        body::after { width: 300px; height: 300px; bottom: -50px; left: -50px; }

        /* ====== NAVBAR ====== */
        /* Navbar dengan efek blur/kaca */
        .navbar {
            padding: 1rem 0;
            position: relative;
            z-index: 10;  /* Pastikan di atas background decor */
            background: rgba(255, 253, 249, 0.7);
            backdrop-filter: blur(10px);  /* Efek glassmorphism */
            border-bottom: 1px solid rgba(255, 233, 153, 0.4);
        }

        .navbar-brand {
            font-weight: 700;
            font-size: 1.5rem;
            color: var(--text-primary) !important;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            text-decoration: none;
        }

        .navbar-brand i {
            font-size: 1.4rem;
            color: var(--pastel-yellow-dark);
        }

        /* Tombol admin dengan style rounded */
        .btn-admin {
            background: var(--white-soft);
            color: var(--text-primary);
            border: 2px solid var(--pastel-yellow-dark);
            padding: 0.5rem 1.25rem;
            border-radius: 50px;  /* Bentuk pill */
            font-weight: 500;
            font-size: 0.9rem;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 0.4rem;
            text-decoration: none;
        }

        .btn-admin:hover {
            background: var(--pastel-yellow-dark);
            transform: translateY(-2px);  /* Efek naik sedikit */
            box-shadow: var(--shadow-hover);
        }

        /* ====== MAIN CONTENT ====== */
        /* Konten utama: flex untuk center vertikal */
        .main-content {
            position: relative;
            z-index: 10;
            min-height: calc(100vh - 76px);  /* Tinggi minimal minus navbar */
            display: flex;
            align-items: center;  /* Center vertikal */
            padding: 2rem 0;
        }

        /* ====== CARD TRACKING ====== */
        /* Card form dengan efek glassmorphism */
        .tracking-card {
            background: rgba(255, 253, 249, 0.9);
            backdrop-filter: blur(20px);  /* Efek blur belakang card */
            border-radius: var(--radius-lg);
            padding: 2.5rem;
            max-width: 480px;  /* Lebar maksimal agar tidak terlalu lebar */
            width: 100%;
            margin: 0 auto;  /* Tengah horizontal */
            box-shadow: var(--shadow-soft);
            border: 1px solid rgba(255, 233, 153, 0.6);
            animation: slideUp 0.6s ease-out;  /* Animasi muncul dari bawah */
        }

        /* Keyframe animasi slide up */
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .tracking-header { margin-bottom: 2rem; text-align: center; }

        /* Icon besar di header card */
        .tracking-icon {
            width: 80px; height: 80px;
            background: linear-gradient(135deg, var(--pastel-yellow), var(--pastel-yellow-dark));
            border-radius: 20px;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 1.5rem;
            box-shadow: 0 8px 24px rgba(255, 217, 102, 0.3);
        }

        .tracking-icon i { font-size: 2rem; color: var(--text-primary); }

        .tracking-header h1 {
            font-weight: 700; font-size: 1.75rem;
            color: var(--text-primary); margin-bottom: 0.5rem;
        }

        .tracking-header p {
            color: var(--text-secondary); font-size: 0.95rem; margin: 0;
        }

        /* ====== FORM INPUT ====== */
        /* Input kode order dengan style khusus */
        .form-control {
            background: var(--white-soft);
            border: 2px solid var(--pastel-yellow-medium);
            border-radius: var(--radius-md);
            padding: 1rem 1.25rem;
            font-size: 1rem;
            color: var(--text-primary);
            transition: var(--transition);
            text-align: center;  /* Teks di tengah */
            font-weight: 500;
            letter-spacing: 2px;  /* Jarak antar huruf kode */
            text-transform: uppercase;  /* Otomatis jadi huruf besar */
            width: 100%;
        }

        /* Placeholder style */
        .form-control::placeholder {
            color: var(--text-secondary); opacity: 0.7;
            letter-spacing: 1px; text-transform: none;
        }

        .form-control:focus {
            background: var(--white-soft);
            border-color: var(--pastel-yellow-dark);
            box-shadow: 0 0 0 4px rgba(255, 217, 102, 0.15);  /* Glow effect */
            outline: none;
        }

        /* Tombol submit dengan gradient */
        .btn-track {
            background: linear-gradient(135deg, var(--pastel-yellow-dark), var(--pastel-yellow-medium));
            color: var(--text-primary);
            border: none;
            border-radius: 50px;
            padding: 1rem;
            font-weight: 600;
            font-size: 1rem;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            width: 100%;
            box-shadow: 0 4px 16px rgba(255, 217, 102, 0.25);
            cursor: pointer;
        }

        .btn-track:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow-hover);
            background: linear-gradient(135deg, var(--pastel-yellow-medium), var(--pastel-yellow-dark));
        }

        /* ====== HELPER TEXT ====== */
        /* Teks bantu di bawah form */
        .helper-text {
            text-align: center;
            margin-top: 1.5rem;
            padding-top: 1.5rem;
            border-top: 1px dashed var(--pastel-yellow-medium);
        }

        .helper-text small {
            color: var(--text-secondary); font-size: 0.85rem;
        }

        /* Style untuk contoh kode */
        .helper-text code {
            background: var(--pastel-yellow);
            color: var(--text-primary);
            padding: 0.2rem 0.5rem;
            border-radius: 6px;
            font-weight: 500;
        }

        /* ====== FOOTER ====== */
        .footer {
            text-align: center; padding: 1.5rem;
            color: var(--text-secondary); font-size: 0.85rem;
            position: relative; z-index: 10;
        }

        .footer a {
            color: var(--text-primary); text-decoration: none; font-weight: 500;
        }

        .footer a:hover { text-decoration: underline; }

        /* ====== RESPONSIVE DESIGN ====== */
        
        /* Tablet: adjust padding & font size */
        @media (max-width: 992px) {
            .tracking-card { padding: 2.5rem 2rem; }
            .tracking-header h1 { font-size: 1.6rem; }
        }

        /* Mobile Large: layout lebih kompak */
        @media (max-width: 767px) {
            .navbar { padding: 0.75rem 0; }
            .navbar-brand { font-size: 1.3rem; }
            .btn-admin { padding: 0.4rem 1rem; font-size: 0.85rem; }
            .main-content { padding: 1.5rem 0; }
            .tracking-card { padding: 2rem 1.5rem; margin: 1rem; border-radius: 20px; }
            .tracking-icon { width: 70px; height: 70px; border-radius: 16px; }
            .tracking-icon i { font-size: 1.75rem; }
            .tracking-header h1 { font-size: 1.5rem; }
            .form-control { padding: 0.9rem 1rem; font-size: 0.95rem; }
            .btn-track { padding: 0.9rem; font-size: 0.95rem; }
        }

        /* Mobile Small: sembunyikan teks, hanya icon */
        @media (max-width: 575px) {
            .navbar-brand span { display: none; }  /* Sembunyikan teks logo */
            .navbar-brand i { font-size: 1.6rem; }
            .btn-admin span { display: none; }  /* Sembunyikan teks tombol */
            .btn-admin i { font-size: 1.2rem; }
            .tracking-card { padding: 1.75rem 1.25rem; margin: 0.75rem; border-radius: 18px; }
            .tracking-icon { width: 60px; height: 60px; border-radius: 14px; }
            .tracking-icon i { font-size: 1.5rem; }
            .tracking-header h1 { font-size: 1.3rem; }
            .tracking-header p { font-size: 0.85rem; }
            .form-control { padding: 0.85rem 0.9rem; font-size: 0.9rem; }
            .btn-track { padding: 0.85rem; font-size: 0.9rem; }
            .helper-text small { font-size: 0.8rem; }
            .footer { padding: 1rem; font-size: 0.8rem; }
        }

        /* Extra Small: font lebih kecil lagi */
        @media (max-width: 374px) {
            .tracking-card { padding: 1.5rem 1rem; }
            .tracking-header h1 { font-size: 1.2rem; }
            .form-control { font-size: 0.85rem; }
            .btn-track { font-size: 0.85rem; }
        }

        /* Landscape Mobile: align ke atas biar muat */
        @media (max-height: 500px) and (orientation: landscape) {
            .main-content { align-items: flex-start; padding-top: 2rem; }
        }

        /* Desktop Large: card lebih lebar */
        @media (min-width: 1400px) {
            .tracking-card { max-width: 520px; }
            .tracking-header h1 { font-size: 2rem; }
            .form-control { font-size: 1.1rem; }
        }

        /* Safe area untuk iPhone notch */
        @supports (padding: max(0px)) {
            .navbar { padding-left: max(1rem, env(safe-area-inset-left)); padding-right: max(1rem, env(safe-area-inset-right)); }
            .footer { padding-bottom: max(1.5rem, env(safe-area-inset-bottom)); }
        }

        /* Reduced motion: untuk user yang prefer minim animasi */
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>

<body>

    <!-- ====== NAVBAR ====== -->
    <!-- Header dengan logo dan tombol admin -->
    <nav class="navbar"> <!-- Navbar Bootstrap -->
        <div class="container"> <!-- Container untuk layout responsive -->
            <!-- Logo: link ke halaman utama -->
            <a class="navbar-brand" href="index.html">
                <i class="bi bi-basket2-fill"></i>
                <span>LaundryGo</span>
            </a>
            <!-- Tombol ke halaman login admin -->
            <a href="login.html" class="btn-admin">
                <i class="bi bi-person-lock"></i>
                <span>Admin</span>
            </a>
        </div>
    </nav>

    <!-- ====== MAIN CONTENT ====== -->
    <main class="main-content">
        <div class="container">
            <!-- ====== CARD FORM TRACKING ====== -->
            <div class="tracking-card">
                
                <!-- Icon Header: visual cue untuk fitur tracking -->
                <div class="tracking-icon">
                    <i class="bi bi-search-heart"></i>
                </div>
                
                <!-- Header Text: judul dan deskripsi -->
                <div class="tracking-header">
                    <h1>Cek Status Laundry</h1>
                    <p>Masukkan kode unik yang diberikan oleh admin</p>
                </div>

                <!-- ====== FORM INPUT KODE ====== -->
                <!-- Form dengan method GET: kode akan muncul di URL -->
                <form action="hasil-tracking.html" method="GET">
                    <div class="mb-4">
                        <!-- Input kode order dengan validasi HTML5 -->
                        <input  
                            type="text" 
                            name="kode"           /* Nama parameter yang dikirim ke URL */
                            class="form-control" 
                            placeholder="LDY001"   /* Contoh format kode */
                            pattern="[A-Za-z0-9]+" /* Hanya huruf & angka */
                            maxlength="10"         /* Maksimal 10 karakter */
                            autocomplete="off"     /* Mencegah autofill browser */
                            required               /* Wajib diisi */
                            autofocus              /* Langsung fokus saat halaman load */
                            style="text-transform: uppercase;"  /* Otomatis huruf besar */
                        ><!-- Input field dengan Bootstrap form-control -->
                    </div>
                    
                    <!-- Tombol submit --> <!-- Tombol dengan Bootstrap button classes -->
                    <button type="submit" class="btn-track">
                        <i class="bi bi-search"></i> <!-- Icon dari Bootstrap Icons -->
                        <span>Cek Status Sekarang</span>
                    </button>
                </form>

                <!-- ====== HELPER TEXT ====== -->
                <!-- Petunjuk kecil di bawah form -->
                <div class="helper-text">
                    <small>
                        Cek nota atau WhatsApp dari admin
                    </small>
                </div>
            </div>
        </div>
    </main>

</body>
</html>
